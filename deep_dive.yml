name: Paid Social Edge — Biweekly Deep Dive

on:
  schedule:
    # Every Tuesday 11:00 UTC (6 AM CDT). Script self-gates to odd weeks only.
    - cron: '0 11 * * 2'
  workflow_dispatch:

jobs:
  send-deep-dive:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tavily-python groq resend pytz

      - name: Run deep dive
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:     ${{ secrets.FROM_EMAIL }}
        run: python deep_dive.py
